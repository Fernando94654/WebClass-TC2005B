<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">WebClass</a>
            <ul class="navbar-nav ms-auto flex-row gap-2">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="profile.html">Profile</a></li>
                <li class="nav-item"><a class="nav-link" href="tags.html">Tags</a></li>
            </ul>
        </div>
    </nav>

    <main class="container main-container">
        <div class="card p-4 shadow-sm">
            <h2 class="mb-3">Profile page</h2>
            <p class="text-muted">Welcome to your profile page!</p>
            <div class="d-flex align-items-center gap-3 mb-3">
                <img src="public/avatar.jpg" alt="Profile Picture" class="profile-img"/>
                <div>
                    <h3 class="h5 mb-2">Name: <span id="profileName">Cargando...</span></h3>
                    <p class="mb-1"><span class="badge text-bg-secondary">Email</span> <span id="profileEmail">Cargando...</span></p>
                    <p class="mb-0"><span class="badge text-bg-secondary">Creado</span> <span id="profileCreatedAt">Cargando...</span></p>
                </div>
            </div>
            <p id="profileMessage" class="mb-3"></p>
            <button id="logoutBtn" class="btn btn-outline-danger">Cerrar sesion</button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
